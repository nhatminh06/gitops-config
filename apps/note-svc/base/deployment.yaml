apiVersion: apps/v1
kind: Deployment
metadata:
  name: note-svc
  labels:
    app: note-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: note-svc
  template:
    metadata:
      labels:
        app: note-svc
    spec:
      containers:
        - name: note-svc
          image: ghcr.io/YOUR_USER/note-svc:latest
          ports:
            - containerPort: 8082
          env:
            - name: PORT
              value: "8082"
            - name: REDIS_URL
              value: "redis:6379"
            - name: USER_SVC_URL
              value: "http://user-svc:8081"
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 3
            periodSeconds: 5