apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-gateway
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/nhatminh06/gitops-config.git
    targetRevision: HEAD
    path: apps/api-gateway/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: notekeeper
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true